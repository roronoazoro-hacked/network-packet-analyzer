version: '3.8'

services:
  packet-analyzer:
    build: .
    container_name: packet-analyzer
    network_mode: host
    privileged: true
    ports:
      - "5000:5000"
    volumes:
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml
    env_file:
      - .env
    restart: unless-stopped

    # Show container logs with timestamp
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"